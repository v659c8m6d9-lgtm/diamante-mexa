<meta name="apple-mobile-web-app-title" content="Diamante Mexa">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#0e1116; --panel:#171c24; --panel2:#1e242e; --line:#2a313d;
    --red:#d6263b; --red-dim:#8e1c2a; --cream:#f4ede0; --gold:#e8b04b;
    --green:#3fa96a; --yellow:#e8b04b; --txt:#e7ebf0; --muted:#8b96a5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:radial-gradient(circle at 20% 0%,rgba(214,38,59,.10),transparent 45%),radial-gradient(circle at 90% 10%,rgba(232,176,75,.06),transparent 40%);
    color:var(--txt);font-family:'Archivo',sans-serif;min-height:100vh;padding-bottom:60px;
  }
  header{
    border-bottom:1px solid var(--line);padding:26px 22px 20px;position:sticky;top:0;
    background:rgba(14,17,22,.92);backdrop-filter:blur(10px);z-index:10;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .accwrap{margin-left:auto;display:flex;gap:8px}
  .acc{text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 14px;cursor:pointer;transition:.15s;min-width:108px}
  .acc:hover{border-color:var(--gold)}
  .acc-num{font-family:'Bebas Neue';font-size:26px;line-height:1;color:var(--gold)}
  .acc-lbl{font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .acc-detail{font-size:9.5px;color:var(--muted);margin-top:4px;line-height:1.3;max-width:130px}
  .logo{
    width:50px;height:50px;border-radius:12px;overflow:hidden;flex-shrink:0;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }
  .logo img{width:100%;height:100%;object-fit:cover;display:block}
  h1{font-family:'Bebas Neue';font-size:34px;letter-spacing:1.5px;line-height:1;color:var(--cream)}
  .sub{color:var(--muted);font-size:12.5px;letter-spacing:.5px;margin-top:3px}
  .datebar{display:flex;gap:10px;align-items:center;margin-top:18px}
  .navbtn{width:42px;height:42px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);color:var(--cream);font-size:24px;line-height:1;cursor:pointer;transition:.15s;display:grid;place-items:center;flex-shrink:0;padding-bottom:3px}
  .navbtn:hover{background:var(--red);border-color:var(--red)}
  .datedisplay{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px 22px;text-align:center;cursor:pointer;min-width:190px;transition:.15s}
  .datedisplay:hover{border-color:var(--gold)}
  .dd-main{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;color:var(--cream);line-height:1}
  .dd-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-top:2px;text-transform:capitalize}
  .datedisplay input[type=date]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .todaybtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:0 16px;height:42px;font-family:'Archivo';font-weight:600;font-size:12px;letter-spacing:.5px;cursor:pointer;transition:.15s;flex-shrink:0}
  .todaybtn:hover{border-color:var(--gold);color:var(--gold)}
  .datebar label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
  input[type=date]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:9px;font-family:'Archivo';font-size:14px}
  button.go{background:var(--red);color:var(--cream);border:none;border-radius:9px;padding:9px 18px;font-family:'Archivo';font-weight:700;font-size:13px;letter-spacing:.5px;cursor:pointer;transition:.15s}
  button.go:hover{background:#ec2c43}
  main{max-width:760px;margin:0 auto;padding:24px 18px}

  /* selector de vista */
  .viewtabs{display:flex;gap:8px;margin-bottom:18px}
  .vtab{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:11px;border-radius:11px;font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;cursor:pointer;transition:.15s}
  .vtab.active{background:var(--red);color:var(--cream);border-color:var(--red)}

  /* logos */
  .tlogo{width:30px;height:30px;object-fit:contain;flex-shrink:0}
  .tlogo.big{width:38px;height:38px}
  .tname-row{display:flex;align-items:center;gap:9px}
  .team.home .tname-row{flex-direction:row-reverse}

  /* standing */
  .zone{margin-bottom:24px}
  .zone-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:1.5px;color:var(--cream);margin-bottom:10px;display:flex;align-items:center;gap:9px}
  .zone-title::before{content:'';width:4px;height:20px;background:var(--red);border-radius:2px}
  .stable{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  .stable th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:6px 8px;text-align:center;border-bottom:1px solid var(--line)}
  .stable th.l{text-align:left}
  .stable td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--line);font-size:13.5px}
  .stable td.tm{text-align:left}
  .stable .tm-row{display:flex;align-items:center;gap:9px}
  .stable .tm-row .pos{color:var(--muted);font-size:12px;width:16px;text-align:right}
  .stable .tm-row .nm{font-weight:600;color:var(--cream);font-size:13.5px}
  .stable tr:hover td{background:rgba(255,255,255,.02)}
  .stable .pct{color:var(--gold);font-weight:700}
  .stable .leader td{background:rgba(232,176,75,.04)}
  .stable .gb{color:var(--muted)}

  /* ---- pizarra ---- */
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .bcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;animation:rise .4s ease both}
  .bcard:hover{border-color:var(--red-dim);transform:translateY(-2px)}
  .bcard.fav-on{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 12px rgba(63,169,106,.16)}
  .bcard.fav-off{border-color:var(--red);box-shadow:0 0 0 1px var(--red),0 0 12px rgba(214,38,59,.16)}
  .bcard-head{display:flex;justify-content:space-between;align-items:center;padding:7px 13px;background:var(--panel2);border-bottom:1px solid var(--line);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .bcard-head .st-final{color:var(--muted)}
  .bcard-head .st-live{color:#ff6072;font-weight:700}
  .bcard-head .st-prev{color:var(--gold)}
  .bcard-head .st-post{color:#7e8a9a}
  .bcard-body{padding:11px 13px}
  .bche-head{display:grid;grid-template-columns:24px 1fr 24px 24px 24px;gap:6px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:3px;border-bottom:1px solid var(--line);margin-bottom:2px}
  .bche-head span{text-align:center}
  .bche-head .hsp{text-align:left;grid-column:1 / 3}
  .brow{display:grid;grid-template-columns:24px 1fr 24px 24px 24px;align-items:center;gap:6px;padding:5px 0;font-variant-numeric:tabular-nums}
  .brow + .brow{border-top:1px solid var(--line)}
  .brow img{width:22px;height:22px;object-fit:contain}
  .brow .bn{font-weight:600;color:var(--cream);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .bn small{color:var(--muted);font-weight:400;font-size:10.5px;display:block;margin-top:1px}
  .brow .bc{font-family:'Bebas Neue';font-size:22px;color:var(--cream);text-align:center;line-height:1}
  .brow .bhe{font-size:12.5px;color:var(--muted);text-align:center}
  .brow.winner .bc{color:var(--gold)}
  .bcard-pitchers{padding:8px 13px 11px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);line-height:1.5}
  .bcard-pitchers b{color:var(--txt);font-weight:600}
  .bcard-live{border-top:1px solid var(--line);background:rgba(214,38,59,.04);display:flex;align-items:center;justify-content:center;padding:8px}
  .bcard-fc{padding:7px 13px;border-top:1px solid var(--line);font-size:10.5px;display:flex;justify-content:space-between;align-items:center}
  .bcard-fc .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .status{color:var(--muted);text-align:center;padding:40px 0;font-size:15px}
  .status .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .game{background:var(--panel);border:1px solid var(--line);border-radius:16px;margin-bottom:16px;overflow:hidden;animation:rise .4s ease both;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s}
  .game:hover{border-color:var(--red-dim);transform:translateY(-2px)}
  .game.fav-on{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 14px rgba(63,169,106,.18)}
  .game.fav-off{border-color:var(--red);box-shadow:0 0 0 1px var(--red),0 0 14px rgba(214,38,59,.18)}
  .game.fav-on:hover,.game.fav-off:hover{transform:translateY(-2px)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .game-head{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel2);border-bottom:1px solid var(--line);font-size:11.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .badge{padding:3px 9px;border-radius:20px;font-weight:700;font-size:10.5px}
  .badge.final{background:rgba(139,150,165,.15);color:var(--muted)}
  .badge.live{background:rgba(214,38,59,.18);color:#ff6072}
  .badge.prev{background:rgba(232,176,75,.15);color:var(--gold)}
  .badge.susp{background:rgba(126,138,154,.18);color:#9aa7ba}
  .live-susp{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;color:#9aa7ba;text-align:center;white-space:nowrap}
  .matchup{display:flex;align-items:stretch}
  .team{flex:1;padding:18px 16px;display:flex;flex-direction:column;gap:9px}
  .team.home{align-items:flex-end;text-align:right}
  .tname{font-family:'Bebas Neue';font-size:24px;letter-spacing:.5px;line-height:.95;color:var(--cream)}
  .trec{font-size:11.5px;color:var(--muted)}
  .score{font-family:'Bebas Neue';font-size:40px;color:var(--cream);line-height:.8}
  .vs{display:grid;place-items:center;padding:0 6px;color:var(--muted);font-size:12px;font-weight:700}
  .pitcher{margin-top:4px;padding-top:9px;border-top:1px dashed var(--line);width:100%}
  .team.home .pitcher{text-align:right}
  .plabel{font-size:9.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .pname{font-size:14px;font-weight:600;color:var(--txt);margin-top:2px}
  .pstat{font-size:11.5px;color:var(--gold);margin-top:3px;font-variant-numeric:tabular-nums}
  .pstat span{color:var(--muted)}
  .tapnote{text-align:center;font-size:10.5px;color:var(--muted);padding:0 0 12px;letter-spacing:.5px}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:30px;letter-spacing:.5px;padding:0 20px}
  .err{background:rgba(214,38,59,.1);border:1px solid var(--red-dim);color:#ff8a96;padding:14px 16px;border-radius:12px;font-size:13.5px;line-height:1.5}

  /* ---- indicador en vivo (centro) ---- */
  .livecenter{display:flex;flex-direction:column;align-items:center;gap:7px;padding:0 4px}
  .live-inning{display:flex;align-items:center;gap:5px;font-family:'Bebas Neue';font-size:17px;letter-spacing:.5px;color:var(--cream);white-space:nowrap}
  .live-inning .arrow{font-size:11px;color:var(--gold)}
  .live-outs{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
  .out-dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--muted);display:inline-block}
  .out-dot.on{background:var(--gold);border-color:var(--gold)}
  /* diamante de bases: rombo con home abajo, 1B derecha, 2B arriba, 3B izquierda */
  .diamond{position:relative;width:38px;height:38px}
  .base{position:absolute;width:12px;height:12px;background:var(--panel2);border:1.5px solid var(--muted);transform:rotate(45deg)}
  .base.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(232,176,75,.6)}
  .base.b2{top:0;left:50%;margin-left:-6px}
  .base.b1{right:0;top:50%;margin-top:-6px}
  .base.b3{left:0;top:50%;margin-top:-6px}

  /* ---- semaforo / pronostico ---- */
  .forecast{border-top:1px solid var(--line);padding:13px 16px;background:rgba(0,0,0,.15)}
  .fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .fc-label{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.green{background:var(--green);box-shadow:0 0 8px rgba(63,169,106,.7)}
  .dot.yellow{background:var(--yellow);box-shadow:0 0 8px rgba(232,176,75,.7)}
  .dot.red{background:var(--red);box-shadow:0 0 8px rgba(214,38,59,.7)}
  .fc-pick{font-size:12px;font-weight:700;color:var(--cream)}
  .fc-bar{height:8px;border-radius:6px;overflow:hidden;display:flex;background:var(--panel2);border:1px solid var(--line)}
  .fc-bar .away-fill{background:#54607a}
  .fc-bar .home-fill{background:var(--red)}
  .fc-pcts{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;font-variant-numeric:tabular-nums}
  .fc-pcts .a{color:#9aa7ba}
  .fc-pcts .h{color:#ff7a88}

  /* ---- cuotas / valor ---- */
  .odds{margin-top:12px;padding-top:11px;border-top:1px dashed var(--line)}
  .odds-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .odds-title{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .odds-fmt{display:flex;gap:4px}
  .odds-fmt button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);font-size:9.5px;padding:3px 7px;border-radius:6px;cursor:pointer;letter-spacing:.5px}
  .odds-fmt button.on{background:var(--red);border-color:var(--red);color:#fff}
  .odds-inputs{display:flex;gap:8px}
  .odds-field{flex:1;display:flex;flex-direction:column;gap:3px}
  .odds-field label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .odds-field input{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--cream);font-size:14px;font-variant-numeric:tabular-nums;width:100%;text-align:center}
  .odds-field input:focus{outline:none;border-color:var(--gold)}
  .odds-result{margin-top:9px;font-size:12px;line-height:1.5;padding:9px 11px;border-radius:9px;display:none}
  .odds-result.show{display:block}
  .odds-result.value-yes{background:rgba(63,169,106,.1);border:1px solid rgba(63,169,106,.35);color:#7fd6a0}
  .odds-result.value-no{background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .odds-result b{color:var(--cream)}
  .odds-result .imp{color:var(--muted);font-size:11px}

  /* ---- estrategia / bankroll ---- */
  .bank-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  .bank-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px}
  .bank-stat{flex:1;min-width:130px}
  .bank-stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
  .bank-stat .val{font-family:'Bebas Neue';font-size:30px;line-height:1;color:var(--cream)}
  .bank-stat .val.pos{color:var(--green)}
  .bank-stat .val.neg{color:#ff6072}
  .bank-edit{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .bank-edit input{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--cream);font-size:15px;width:130px;font-variant-numeric:tabular-nums}
  .bank-edit input:focus{outline:none;border-color:var(--gold)}
  .bank-edit button{background:var(--red);border:none;color:#fff;border-radius:9px;padding:9px 16px;font-family:'Archivo';font-weight:600;font-size:13px;cursor:pointer}
  .bank-edit button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .strat-section-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:var(--cream);margin:22px 0 12px}
  .sug-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
  .sug-card.has-value{border-color:rgba(63,169,106,.4)}
  .sug-match{font-size:13px;color:var(--muted);margin-bottom:8px}
  .sug-pick{font-family:'Bebas Neue';font-size:19px;color:var(--cream);letter-spacing:.5px}
  .sug-edge{display:inline-block;background:rgba(63,169,106,.12);color:#7fd6a0;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .sug-amounts{display:flex;gap:10px;margin-top:12px}
  .sug-amt{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:.15s}
  .sug-amt:hover{border-color:var(--gold)}
  .sug-amt .amt-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .sug-amt .amt-val{font-family:'Bebas Neue';font-size:24px;color:var(--gold);line-height:1.1;margin-top:2px}
  .bet-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:10px}
  .bet-row:last-child{border-bottom:none}
  .bet-info{flex:1;min-width:0}
  .bet-info .bp{font-weight:600;color:var(--cream);font-size:14px}
  .bet-info .bd{font-size:11px;color:var(--muted);margin-top:2px}
  .bet-actions{display:flex;gap:6px}
  .bet-actions button{border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .bet-win{background:rgba(63,169,106,.15);color:#7fd6a0;border:1px solid rgba(63,169,106,.4)!important}
  .bet-lose{background:rgba(214,38,59,.12);color:#ff8a96;border:1px solid var(--red-dim)!important}
  .bet-del{background:transparent;color:var(--muted);border:1px solid var(--line)!important}
  .bet-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .bet-status.won{background:rgba(63,169,106,.15);color:#7fd6a0}
  .bet-status.lost{background:rgba(214,38,59,.12);color:#ff8a96}
  .strat-empty{color:var(--muted);text-align:center;padding:30px 16px;font-size:13.5px;line-height:1.6}
  .strat-note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:8px;padding:10px 12px;background:rgba(232,176,75,.05);border:1px solid rgba(232,176,75,.2);border-radius:9px}
  .fc-wait{font-size:11px;color:var(--muted);font-style:italic}
  .fc-partial-note{font-size:11px;color:#9aa7ba;line-height:1.5;margin-top:10px;padding:9px 11px;background:rgba(126,138,154,.08);border:1px solid rgba(126,138,154,.25);border-radius:9px}

  /* ---- modal detalle ---- */
  .overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto}
  .overlay.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:720px;width:100%;animation:rise .3s ease both;margin-bottom:40px}
  .sheet-head{position:sticky;top:0;background:var(--panel2);border-bottom:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
  .sheet-title{font-family:'Bebas Neue';font-size:24px;letter-spacing:.5px;color:var(--cream);line-height:1}
  .sheet-title small{display:block;font-family:'Archivo';font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:3px;text-transform:uppercase}
  .close{background:none;border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer;transition:.15s}
  .close:hover{border-color:var(--red);color:var(--red)}
  .sheet-body{padding:20px}
  .linescore{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;margin-bottom:22px;font-size:13px}
  .linescore th,.linescore td{padding:6px 7px;text-align:center;border-bottom:1px solid var(--line)}
  .linescore th{color:var(--muted);font-weight:600;font-size:11px}
  .linescore td.tm{text-align:left;font-weight:700;color:var(--cream);white-space:nowrap}
  .linescore td.tot{font-weight:800;color:var(--gold)}
  .sech{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:var(--cream);margin:18px 0 10px;border-left:3px solid var(--red);padding-left:9px}
  .bat{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
  .bat th,.bat td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--line)}
  .bat th{color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase}
  .bat td.nm{text-align:left;white-space:nowrap;color:var(--txt)}
  .bat tr:hover td{background:rgba(255,255,255,.02)}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px;border-radius:9px;font-family:'Archivo';font-weight:600;font-size:12px;cursor:pointer;transition:.15s}
  .tab.active{background:var(--red);color:var(--cream);border-color:var(--red)}
  .cmp{display:flex;gap:10px;margin-top:6px}
  .cmp .col{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .cmp .col h4{font-family:'Bebas Neue';font-size:17px;color:var(--cream);letter-spacing:.5px;margin-bottom:8px}
  .cmp .row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px dashed var(--line)}
  .cmp .row span{color:var(--muted)}
  .cmp .row b{color:var(--gold);font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<script>
const API = "https://statsapi.mlb.com/api/v1";
const out = document.getElementById('out');
const dateInput = document.getElementById('date');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
let GAMES = {};

// fecha local (no UTC) para que no se adelante por zona horaria
function localDate(d){
  d = d || new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}

// muestra la etiqueta bonita: "Hoy", "Ayer", "Mañana" o "vie, 5 jun"
function updateDateLabel(){
  const val = dateInput.value;
  const hoy = localDate();
  const main = document.getElementById('ddMain');
  const sub = document.getElementById('ddSub');
  // diferencia en días
  const d = new Date(val + 'T12:00:00');
  const h = new Date(hoy + 'T12:00:00');
  const diff = Math.round((d - h) / 86400000);
  let etiqueta;
  if(diff === 0) etiqueta = 'Hoy';
  else if(diff === -1) etiqueta = 'Ayer';
  else if(diff === 1) etiqueta = 'Mañana';
  else etiqueta = d.toLocaleDateString('es-MX', {weekday:'short'});
  main.textContent = etiqueta;
  sub.textContent = d.toLocaleDateString('es-MX', {day:'numeric', month:'long'});
}

function shiftDay(delta){
  const d = new Date(dateInput.value + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  dateInput.value = localDate(d);
  updateDateLabel();
  load();
}

dateInput.value = localDate();
updateDateLabel();
document.getElementById('prevDay').addEventListener('click', ()=>shiftDay(-1));
document.getElementById('nextDay').addEventListener('click', ()=>shiftDay(1));
document.getElementById('todayBtn').addEventListener('click', ()=>{ dateInput.value = localDate(); updateDateLabel(); load(); });
dateInput.addEventListener('change', ()=>{ updateDateLabel(); load(); });
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeSheet(); });

async function load(){
  const date = dateInput.value;
  out.innerHTML = '<div class="status"><div class="spinner"></div>Cargando partidos…</div>';
  GAMES = {};
  try{
    const sched = await fetch(`${API}/schedule?sportId=23&date=${date}&hydrate=probablePitcher,linescore,team`).then(r=>r.json());
    const dates = sched.dates || [];
    if(!dates.length || !dates[0].games.length){
      out.innerHTML = '<div class="status">No hay partidos de la LMB en esta fecha.<br>Prueba con otra fecha de la temporada.</div>';
      return;
    }
    out.innerHTML = '';
    for(const g of dates[0].games){
      GAMES[g.gamePk] = g;
      out.appendChild(renderGame(g));
      hydratePitchers(g);
      if(gameState(g) === 'live') hydrateLive(g);
    }
    computeDayAccuracy();
  }catch(e){
    out.innerHTML = `<div class="err"><b>No se pudieron cargar los datos.</b><br>${e.message}<br><br>Si abriste el archivo directo (file://), corre un servidor local con: <b>python3 -m http.server 8000</b> y entra a http://localhost:8000</div>`;
  }
}

// trae el linescore completo (con corredores en base) de un partido en vivo y repinta el centro
async function hydrateLive(g){
  try{
    const ls = await fetch(`${API}/game/${g.gamePk}/linescore`).then(r=>r.json());
    g.linescore = ls;
    const card = document.getElementById(`fc-${g.gamePk}`)?.closest('.game');
    if(card){
      const vs = card.querySelector('.vs');
      if(vs) vs.innerHTML = liveCenter(g);
      paintFrame(g, card);
    }
  }catch(e){ /* si falla, se queda con lo que vino del schedule */ }
}

function liveCenter(g){
  const st = gameState(g);
  // partido suspendido: mostrar nota clara en vez de indicador en vivo
  if(st === 'suspended') return '<div class="live-susp">⏸ Suspendido</div>';
  if(st === 'delayed')   return '<div class="live-susp">⏱ Retrasado</div>';
  // solo mostrar el indicador en vivo si REALMENTE esta en juego
  if(st !== 'live') return 'VS';
  const ls = g.linescore || {};
  const inning = ls.currentInning || '';
  const half = (ls.inningHalf || '').toLowerCase();
  const esHalf = half === 'top' ? 'Alta' : (half === 'bottom' ? 'Baja' : '');
  const arrow = half === 'top' ? '▲' : (half === 'bottom' ? '▼' : '');
  const outs = ls.outs ?? 0;
  const off = ls.offense || {};
  const b1 = !!off.first, b2 = !!off.second, b3 = !!off.third;
  let outDots = '';
  for(let i=0;i<3;i++) outDots += `<span class="out-dot ${i<outs?'on':''}"></span>`;
  return `
    <div class="livecenter">
      <div class="live-inning"><span class="arrow">${arrow}</span> ${inning ? inning+'ª '+esHalf : 'Vivo'}</div>
      <div class="diamond">
        <span class="base b2 ${b2?'on':''}"></span>
        <span class="base b1 ${b1?'on':''}"></span>
        <span class="base b3 ${b3?'on':''}"></span>
      </div>
      <div class="live-outs">${outDots} ${outs} out${outs===1?'':'s'}</div>
    </div>`;
}

// estado normalizado del partido, detectando suspendidos/pospuestos/retrasados
// devuelve: 'final' | 'live' | 'suspended' | 'postponed' | 'delayed' | 'preview'
function gameState(g){
  const abs = (g.status && g.status.abstractGameState) || '';
  const ds = ((g.status && g.status.detailedState) || '').toLowerCase();
  const cs = ((g.status && g.status.codedGameState) || '');
  if(ds.includes('suspend') || cs==='U' || cs==='T') return 'suspended';
  if(ds.includes('postpon') || ds.includes('pospu') || cs==='D' || cs==='P') return 'postponed';
  if(ds.includes('delay') || ds.includes('retras')) return 'delayed';
  if(abs === 'Final') return 'final';
  if(abs === 'Live') return 'live';
  return 'preview';
}

function statusBadge(g){
  const st = gameState(g);
  if(st === 'final')     return '<span class="badge final">Final</span>';
  if(st === 'live')      return '<span class="badge live">● En vivo</span>';
  if(st === 'suspended') return '<span class="badge susp">Suspendido</span>';
  if(st === 'postponed') return '<span class="badge susp">Pospuesto</span>';
  if(st === 'delayed')   return '<span class="badge susp">Retrasado</span>';
  return '<span class="badge prev">Por jugar</span>';
}

          <div class="pname">${awayPP?awayPP.fullName:'Por confirmar'}</div>

        </div>
      </div>

        <div class="tname-row"><img class="tlogo" src="${logoUrl(home.team.id)}" alt="" onerror="this.style.display='none'"><div class="tname">${home.team.name}</div></div>
        <div class="trec">${rec(home)}</div>
        ${homeScore!=='' ? `<div class="score">${homeScore}</div>`:''}
        <div class="pitcher">
          <div class="plabel">Pitcher probable</div>
          <div class="pname">${homePP?homePP.fullName:'Por confirmar'}</div>
          <div class="pstat" id="ps-${g.gamePk}-home">${homePP?'<span>cargando ERA…</span>':''}</div>

function rec(side){ const lr=side.leagueRecord; return lr?`${lr.wins}-${lr.losses}`:''; }

async function hydratePitchers(g){
  const season = (g.gameDate||'').slice(0,4) || '2026';
  g._pstats = g._pstats || {};
  for(const side of ['away','home']){
    const pp = g.teams[side].probablePitcher;
    const cell = document.getElementById(`ps-${g.gamePk}-${side}`);
    if(!pp){ g._pstats[side] = null; continue; }
    try{
      const url = `${API}/people/${pp.id}?hydrate=stats(group=[pitching],type=[season],season=${season},sportId=23)`;
      const data = await fetch(url).then(r=>r.json());
      const splits = data.people[0].stats?.[0]?.splits;
      if(splits && splits.length){
        const s = splits[0].stat;
        g._pstats[side] = {era:parseFloat(s.era), whip:parseFloat(s.whip), ip:parseIP(s.inningsPitched)};
        if(cell) cell.innerHTML = `ERA <b>${s.era ?? '–'}</b> · <span>WHIP</span> ${s.whip ?? '–'} · <span>K</span> ${s.strikeOuts ?? '–'} · ${s.wins}-${s.losses}`;
      }else{
        g._pstats[side] = null;
        if(cell) cell.innerHTML = `<span>Sin estadísticas de temporada</span>`;
      }
    }catch(err){ g._pstats[side]=null; if(cell) cell.innerHTML = `<span>ERA no disponible</span>`; }
  }
  computeForecast(g);
}

/* ---------- MODELO DE PRONOSTICO ---------- */
// Pesos: pitcher 45%, forma del equipo 30%, ventaja local 15%, margen humano 10% (reservado)
function logistic(x){ return 1/(1+Math.exp(-x)); }
// convierte inningsPitched de la API ("37.2" = 37 y 2/3) a decimal real
function parseIP(ipStr){
  if(ipStr===undefined||ipStr===null) return 0;
  const n = parseFloat(ipStr);
  if(isNaN(n)) return 0;
  const whole = Math.floor(n);
  const frac = Math.round((n - whole)*10); // .1 o .2 = tercios
  return whole + (frac===1?1/3:frac===2?2/3:0);
}

// aplica shrinkage: acerca un valor al promedio de liga si hay pocas entradas
// valor_ajustado = (IP*valor + K*promedio) / (IP + K)  ·  K=30 (equilibrado)
const SHRINK_K = 30;
function shrinkStat(valor, ip, promedio){
  if(!ip || ip<=0) return promedio; // sin entradas, usar el promedio puro
  return (ip*valor + SHRINK_K*promedio) / (ip + SHRINK_K);
}

function pitcherScore(era, whip, ip){
  // promedios de referencia LMB (liga de bateo alto): ERA ~5.0, WHIP ~1.45
  if(isNaN(era)||isNaN(whip)) return null;
  // shrinkage hacia el promedio para pitchers con pocas entradas
  const eraAdj  = shrinkStat(era, ip, 5.0);
  const whipAdj = shrinkStat(whip, ip, 1.45);
  const eraTerm = (5.0 - eraAdj);
  const whipTerm = (1.45 - whipAdj) * 5;
  return eraTerm + whipTerm;
}
function teamForm(side){
  const lr = side.leagueRecord; if(!lr) return 0;
  const g = lr.wins + lr.losses; if(!g) return 0;
  return (lr.wins/g) - 0.5;
}
function oddsBlockHTML(g){
  const awayName = g.teams.away.team.name;
  const homeName = g.teams.home.team.name;
  return `
    <div class="odds" onclick="event.stopPropagation()">
      <div class="odds-head">
        <span class="odds-title">Cuotas de la casa</span>
        <div class="odds-fmt" id="ofmt-${g.gamePk}">
          <button class="on" onclick="setOddsFmt(${g.gamePk},'american',this)">−150</button>
          <button onclick="setOddsFmt(${g.gamePk},'decimal',this)">1.65</button>
        </div>
      </div>
      <div class="odds-inputs">
        <div class="odds-field">
          <label>${awayName}</label>
          <input type="text" inputmode="text" id="oa-${g.gamePk}" placeholder="—" oninput="onOddsInput(${g.gamePk})">
        </div>
        <div class="odds-field">
          <label>${homeName}</label>
          <input type="text" inputmode="text" id="oh-${g.gamePk}" placeholder="—" oninput="onOddsInput(${g.gamePk})">
        </div>
      </div>
      <div class="odds-result" id="ores-${g.gamePk}"></div>
    </div>`;
}

function computeForecast(g){
  const box = document.getElementById(`fc-${g.gamePk}`);
  if(!box) return;
  const ps = g._pstats || {};
  const ph = ps.home ? pitcherScore(ps.home.era, ps.home.whip, ps.home.ip) : null;
  const pa = ps.away ? pitcherScore(ps.away.era, ps.away.whip, ps.away.ip) : null;

  // Sin AMBOS pitchers: pronostico PARCIAL (forma + ventaja local), confianza reducida.
  if(ph===null || pa===null){
    const homeName = g.teams.home.team.name;
    const awayName = g.teams.away.team.name;
    // pesos del modelo completo: pitcher .45, forma .30, local .15
    // sin pitcher usamos el MODELO BASE (forma + local, mismos pesos del backtest ~60%)
    const formDiff = teamForm(g.teams.home) - teamForm(g.teams.away);
    const homeAdv = 1.0;
    const z = (0.30 * formDiff * 6.0) + (0.15 * homeAdv * 1.6);
    let probHome = logistic(z);
    let probAway = 1 - probHome;
    const favHome = probHome >= probAway;
    const favProb = favHome ? probHome : probAway;
    const favName = favHome ? homeName : awayName;

    // guardar como pronostico PARCIAL (hasFull:false) -> no genera apuestas ni cuenta para efectividad con pitcher
    g._pick = { favHome, probHome, hasFull:false, partial:true };

    box.innerHTML = `
      <div class="fc-top">
        <div class="fc-label"><span class="dot" style="background:#7e8a9a;box-shadow:none"></span> Estimado sin pitcher</div>
        <div class="fc-pick" style="color:#9aa7ba">${favName} ${(favProb*100).toFixed(0)}%</div>
      </div>
      <div class="fc-bar" style="opacity:.6">
        <div class="away-fill" style="width:${(probAway*100).toFixed(1)}%"></div>
        <div class="home-fill" style="width:${(probHome*100).toFixed(1)}%"></div>
      </div>
      <div class="fc-pcts">
        <span class="a">${awayName} ${(probAway*100).toFixed(0)}%</span>
        <span class="h">${(probHome*100).toFixed(0)}% ${homeName}</span>
      </div>
      <div class="fc-partial-note">⚠️ Estimado sin pitcher confirmado · confianza reducida. Basado solo en forma de equipo y ventaja local (falta el factor pitcher, que pesa casi la mitad del modelo). No genera sugerencias de apuesta.</div>
      ${oddsBlockHTML(g)}`;
    restoreOdds(g.gamePk);
    const cardP = box.closest('.game');
    if(cardP) paintFrame(g, cardP);
    return;
  }

  const pitchDiff = ph - pa;
  const formDiff = teamForm(g.teams.home) - teamForm(g.teams.away);
  const homeAdv = 1.0;

  const z = (0.45 * pitchDiff * 0.35) + (0.30 * formDiff * 6.0) + (0.15 * homeAdv * 1.6);
  let probHome = logistic(z);
  let probAway = 1 - probHome;

  const homeName = g.teams.home.team.name;
  const awayName = g.teams.away.team.name;
  const favHome = probHome >= probAway;
  const favProb = favHome ? probHome : probAway;
  const favName = favHome ? homeName : awayName;

  let cls='yellow', txt='Ligero favorito';
  if(favProb>=0.62){ cls='green'; txt='Favorito claro'; }
  else if(favProb<0.55){ cls='yellow'; txt='Casi parejo'; }

  // guardar el pronostico completo (con pitcher) para medir efectividad del dia
  g._pick = { favHome, probHome, hasFull:true };
  computeDayAccuracy();
  // pintar el marco segun como va el partido contra el pronostico
  const card = box.closest('.game');
  if(card) paintFrame(g, card);

  box.innerHTML = `
    <div class="fc-top">
      <div class="fc-label"><span class="dot ${cls}"></span> ${txt}</div>
      <div class="fc-pick">${favName} ${(favProb*100).toFixed(0)}%</div>
    </div>
    <div class="fc-bar">
      <div class="away-fill" style="width:${(probAway*100).toFixed(1)}%"></div>
      <div class="home-fill" style="width:${(probHome*100).toFixed(1)}%"></div>
    </div>
    <div class="fc-pcts">
      <span class="a">${awayName} ${(probAway*100).toFixed(0)}%</span>
      <span class="h">${(probHome*100).toFixed(0)}% ${homeName}</span>
    </div>
    ${oddsBlockHTML(g)}`;

  // restaurar cuotas guardadas y formato
  restoreOdds(g.gamePk);
}

/* ---------- CUOTAS Y VALOR ---------- */
const ODDS_FMT = {}; // gamePk -> 'american' | 'decimal'

function setOddsFmt(pk, fmt, btn){
  ODDS_FMT[pk] = fmt;
  // marcar boton activo
  const cont = document.getElementById('ofmt-'+pk);
  if(cont){ for(const b of cont.children) b.classList.remove('on'); btn.classList.add('on'); }
  // recalcular con el nuevo formato
  onOddsInput(pk);
  // guardar preferencia de formato
  const saved = loadOdds(pk) || {};
  saved.fmt = fmt;
  localStorage.setItem('odds:'+pk, JSON.stringify(saved));
}

// convierte una cuota (segun formato) a probabilidad implicita 0..1
function oddsToProb(raw, fmt){
  if(raw===''||raw===null||raw===undefined) return null;
  const s = (''+raw).trim().replace(',', '.');
  if(fmt==='decimal'){
    const d = parseFloat(s);
    if(isNaN(d) || d<=1) return null;
    return 1/d;
  } else {
    // americana: +130 o -150
    const n = parseFloat(s.replace('+',''));
    if(isNaN(n) || n===0) return null;
    if(n>0) return 100/(n+100);
    return (-n)/((-n)+100);
  }
}

function onOddsInput(pk){
  const g = GAMES[pk];
  const fmt = ODDS_FMT[pk] || 'american';
  const aRaw = document.getElementById('oa-'+pk)?.value ?? '';
  const hRaw = document.getElementById('oh-'+pk)?.value ?? '';
  // guardar
  localStorage.setItem('odds:'+pk, JSON.stringify({a:aRaw, h:hRaw, fmt}));
  renderOddsResult(pk, aRaw, hRaw, fmt);
}

function renderOddsResult(pk, aRaw, hRaw, fmt){
  const g = GAMES[pk];
  const res = document.getElementById('ores-'+pk);
  if(!res) return;
  const pa = oddsToProb(aRaw, fmt);
  const ph = oddsToProb(hRaw, fmt);
  if(pa===null && ph===null){ res.className='odds-result'; res.innerHTML=''; return; }

  // probabilidad implicita normalizada (quitar el margen de la casa si tenemos ambas)
  let impAway=pa, impHome=ph;
  if(pa!==null && ph!==null){
    const tot = pa+ph;
    impAway = pa/tot; impHome = ph/tot;
  }

  // comparar con nuestro pronostico
  const pick = g?._pick;
  let body = '';
  if(impAway!==null) body += `<div class="imp">Implícita casa · ${g.teams.away.team.name}: ${(impAway*100).toFixed(0)}%</div>`;
  if(impHome!==null) body += `<div class="imp">Implícita casa · ${g.teams.home.team.name}: ${(impHome*100).toFixed(0)}%</div>`;

  if(pick && pick.hasFull && impAway!==null && impHome!==null){
    const ourHome = pick.probHome, ourAway = 1-pick.probHome;
    // valor: nuestro % menos % implicito de la casa
    const edgeHome = ourHome - impHome;
    const edgeAway = ourAway - impAway;
    const THRESH = 0.05; // 5 puntos de diferencia para marcar valor
    let valueSide = null, edge = 0;
    if(edgeHome >= THRESH && edgeHome >= edgeAway){ valueSide = g.teams.home.team.name; edge = edgeHome; }
    else if(edgeAway >= THRESH){ valueSide = g.teams.away.team.name; edge = edgeAway; }

    if(valueSide){
      res.className = 'odds-result show value-yes';
      res.innerHTML = `<b>📈 Posible valor en ${valueSide}</b><br>Nuestro modelo le da ${((valueSide===g.teams.home.team.name?ourHome:ourAway)*100).toFixed(0)}% vs ${((valueSide===g.teams.home.team.name?impHome:impAway)*100).toFixed(0)}% de la casa (+${(edge*100).toFixed(0)} pts).${body}`;
    } else {
      res.className = 'odds-result show value-no';
      res.innerHTML = `<b>Sin valor claro</b> · el modelo y la casa van parejos.${body}`;
    }
  } else {
    res.className = 'odds-result show value-no';
    let msg;
    if(pick && pick.hasFull) msg = `Mete ambas cuotas para detectar valor.`;
    else if(pick && pick.partial) msg = `Cuota guardada. Sin detección de valor: el estimado no incluye pitcher.`;
    else msg = `Cuota guardada. El pronóstico aún no está listo.`;
    res.innerHTML = msg + body;
  }
}

function loadOdds(pk){
  try{ return JSON.parse(localStorage.getItem('odds:'+pk)); }catch(e){ return null; }
}

function restoreOdds(pk){
  const saved = loadOdds(pk);
  if(!saved) return;
  ODDS_FMT[pk] = saved.fmt || 'american';
  // marcar boton de formato
  const cont = document.getElementById('ofmt-'+pk);
  if(cont){
    for(const b of cont.children) b.classList.remove('on');
    const idx = (ODDS_FMT[pk]==='decimal') ? 1 : 0;
    if(cont.children[idx]) cont.children[idx].classList.add('on');
  }
  if(saved.a!==undefined && document.getElementById('oa-'+pk)) document.getElementById('oa-'+pk).value = saved.a;
  if(saved.h!==undefined && document.getElementById('oh-'+pk)) document.getElementById('oh-'+pk).value = saved.h;
  renderOddsResult(pk, saved.a||'', saved.h||'', ODDS_FMT[pk]);
}

// pinta el marco de la tarjeta: verde si va segun el pronostico, rojo si en contra, nada si no inicia
function paintFrame(g, card){
  card.classList.remove('fav-on','fav-off');
  const pick = g._pick;
  const st = gameState(g);
  // sin pronostico completo o partido no en juego/terminado -> sin color
  if(!pick || !pick.hasFull) return;
  if(st !== 'live' && st !== 'final') return;
  const h = g.teams.home, a = g.teams.away;
  if(h.score === undefined || a.score === undefined) return;
  // empate -> sin color (todavia indefinido)
  if(h.score === a.score){ return; }
  const homeGana = h.score > a.score;
  const vaSegunPronostico = (pick.favHome === homeGana);
  card.classList.add(vaSegunPronostico ? 'fav-on' : 'fav-off');
}

function computeDayAccuracy(){
  const dayNum = document.getElementById('accDayNum');
  const dayDetail = document.getElementById('accDayDetail');
  if(!dayNum) return;
  const games = Object.values(GAMES);
  const total = games.length;
  if(!total){ dayNum.textContent='—'; dayDetail.textContent='sin partidos'; return; }

  let jugados=0, aciertos=0, pendientes=0, conPronostico=0;
  for(const g of games){
    const finalizado = g.status?.abstractGameState === 'Final';
    const pick = g._pick;
    const h = g.teams.home, a = g.teams.away;
    if(finalizado && pick && pick.hasFull && h.score!==undefined && a.score!==undefined){
      jugados++;
      const homeWon = h.score > a.score;
      if(pick.favHome === homeWon) aciertos++;
    }else if(!finalizado){
      pendientes++;
    }
    if(pick && pick.hasFull) conPronostico++;
  }

  if(jugados>0){
    dayNum.textContent = Math.round(aciertos/jugados*100)+'%';
  }else{
    dayNum.textContent = '—';
  }
  // texto de desglose: jugados de total, y pendientes
  let txt = `${jugados} de ${total} jugados`;
  if(jugados>0) txt += ` · ${aciertos} acierto${aciertos===1?'':'s'}`;
  if(pendientes>0) txt += ` · ${pendientes} pendiente${pendientes===1?'':'s'}`;
  dayDetail.textContent = txt;
}

/* ---------- DETALLE ---------- */
async function openSheet(pk){
  const g = GAMES[pk];
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  sheet.innerHTML = `
    <div class="sheet-head">
      <div class="sheet-title">${g.teams.away.team.name} <small>@ ${g.teams.home.team.name}</small></div>
      <button class="close" onclick="closeSheet()">×</button>
    </div>
    <div class="sheet-body"><div class="status"><div class="spinner"></div>Cargando detalle…</div></div>`;

  const state = g.status?.abstractGameState;
  try{
    if(state === 'Preview'){
      await renderPreview(g);
    }else{
      await renderBox(g);
    }
  }catch(e){

/* ---------- BACKTEST / EFECTIVIDAD ---------- */
// Modelo BASE (honesto hacia atras): solo forma de equipo + ventaja local.
// No usa el pitcher porque su ERA de hoy incluiria datos del futuro.
function predictBase(homeSide, awaySide){
  const form = s => { const lr=s.leagueRecord; if(!lr) return 0; const g=lr.wins+lr.losses; return g?(lr.wins/g-0.5):0; };
  const formDiff = form(homeSide) - form(awaySide);
  const z = (0.30*formDiff*6.0) + (0.15*1.0*1.6);
  return logistic(z); // prob de que gane el LOCAL
}

async function runBacktest(days){
  // toma los ultimos `days` dias hasta ayer, junta partidos finalizados
  const end = new Date(); end.setDate(end.getDate()-1);
  const start = new Date(end); start.setDate(start.getDate()-days);
  const fmt = d => localDate(d);
  const url = `${API}/schedule?sportId=23&startDate=${fmt(start)}&endDate=${fmt(end)}&hydrate=team`;
  const sched = await fetch(url).then(r=>r.json());
  let hits=0, total=0, details=[];
  for(const date of (sched.dates||[])){
    for(const g of date.games){
      if(g.status?.abstractGameState !== 'Final') continue;
      const h=g.teams.home, a=g.teams.away;
      if(h.score===undefined || a.score===undefined) continue;
      const probHome = predictBase(h, a);
      const pickHome = probHome >= 0.5;
      const homeWon = h.score > a.score;
      const correct = (pickHome===homeWon);
      if(correct) hits++;
      total++;
      details.push({date:date.date, a:a.team.name, h:h.team.name, as:a.score, hs:h.score, pickHome, probHome, correct});
    }
  }
  return {hits,total,details};
}

function boardRow(side, g, ls){
  const t = side.team;
  const started = ['Final','Live'].includes(g.status?.abstractGameState);
  const teamKey = (side === g.teams.home) ? 'home' : 'away';
  const lt = (ls.teams && ls.teams[teamKey]) || {};
  const runs = started ? (side.score ?? lt.runs ?? '–') : '';
  const hits = started ? (lt.hits ?? '') : '';
  const errs = started ? (lt.errors ?? '') : '';
  // ganador?
  let winner = false;
  if(g.status?.abstractGameState==='Final'){
    const other = (teamKey==='home') ? g.teams.away : g.teams.home;
    winner = (side.score ?? 0) > (other.score ?? 0);
  }
  const shortName = t.name.replace('de ','').split(' ').slice(0,2).join(' ');
  return `<div class="brow ${winner?'winner':''}">
    <img src="${logoUrl(t.id)}" alt="" onerror="this.style.display='none'">
    <div class="bn">${t.name}<small>${rec(side)}</small></div>
    <div class="bc">${runs}</div>
    <div class="bhe">${hits}</div>
    <div class="bhe">${errs}</div>
  </div>`;
}

function renderBoardCard(g){
  const el = document.createElement('div');
  el.className = 'bcard';
  el.addEventListener('click', ()=>openSheet(g.gamePk));
  GAMES[g.gamePk] = GAMES[g.gamePk] || g;

  const started = ['Final','Live'].includes(g.status?.abstractGameState);
  const cheHead = started ? `<div class="bche-head"><span class="hsp">Equipo</span><span>C</span><span>H</span><span>E</span></div>` : '';

  // pitchers ganador/perdedor (en finalizados)
  let pitchers = '';
  const dec = g.decisions;
  if(g.status?.abstractGameState==='Final' && dec){
    const w = dec.winner?.fullName, l = dec.loser?.fullName;
    if(w||l) pitchers = `<div class="bcard-pitchers">${w?`G: <b>${w}</b>`:''}${w&&l?' · ':''}${l?`P: <b>${l}</b>`:''}</div>`;
  }

  // bloque en vivo (entrada + diamante + outs) o nota de suspendido
  let live = '';
  const bst = gameState(g);
  if(bst==='live' || bst==='suspended' || bst==='delayed'){
    live = `<div class="bcard-live" id="blive-${g.gamePk}">${liveCenter(g)}</div>`;
  }

}

function fillBoardForecast(g, card){
  const fc = card.querySelector(`#bfc-${g.gamePk}`);
  if(!fc) return;
  const pick = g._pick;
  if(!pick){ fc.innerHTML = `<span style="color:var(--muted)">Pronóstico pendiente</span>`; return; }
  const favHome = pick.favHome;
  const favName = favHome ? g.teams.home.team.name : g.teams.away.team.name;
  const favProb = favHome ? pick.probHome : (1-pick.probHome);
  // estimado parcial sin pitcher
  if(!pick.hasFull && pick.partial){
    fc.innerHTML = `<span><span class="dot" style="background:#7e8a9a"></span>Sin pitcher</span><span style="color:#9aa7ba;font-weight:600">${favName} ${(favProb*100).toFixed(0)}%</span>`;
    return;
  }
  if(!pick.hasFull){ fc.innerHTML = `<span style="color:var(--muted)">Pronóstico pendiente</span>`; return; }
  let color = 'var(--yellow)';
  if(favProb>=0.62) color = 'var(--green)';
  fc.innerHTML = `<span><span class="dot" style="background:${color}"></span>Pronóstico</span><span style="color:var(--cream);font-weight:600">${favName} ${(favProb*100).toFixed(0)}%</span>`;
}

async function hydrateBoardForecast(g, card){
  const season = (g.gameDate||'').slice(0,4) || '2026';
  g._pstats = {};
  for(const side of ['away','home']){
    const pp = g.teams[side].probablePitcher;
    if(!pp){ g._pstats[side]=null; continue; }
    try{
      const d = await fetch(`${API}/people/${pp.id}?hydrate=stats(group=[pitching],type=[season],season=${season},sportId=23)`).then(r=>r.json());
      const s = d.people[0].stats?.[0]?.splits?.[0]?.stat;
      g._pstats[side] = s ? {era:parseFloat(s.era), whip:parseFloat(s.whip), ip:parseIP(s.inningsPitched)} : null;
    }catch(e){ g._pstats[side]=null; }
  }
  // calcular pick con la misma logica del modelo
  const ph = g._pstats.home ? pitcherScore(g._pstats.home.era, g._pstats.home.whip, g._pstats.home.ip) : null;
  const pa = g._pstats.away ? pitcherScore(g._pstats.away.era, g._pstats.away.whip, g._pstats.away.ip) : null;
  if(ph!==null && pa!==null){
    const pitchDiff = ph - pa;
    const formDiff = teamForm(g.teams.home) - teamForm(g.teams.away);
    const z = (0.45*pitchDiff*0.35) + (0.30*formDiff*6.0) + (0.15*1.0*1.6);
    const probHome = logistic(z);
    g._pick = { favHome: probHome>=0.5, probHome, hasFull:true };
    if(GAMES[g.gamePk]) GAMES[g.gamePk]._pick = g._pick;
  } else {
    // estimado parcial sin pitcher (modelo base: forma + ventaja local)
    const formDiff = teamForm(g.teams.home) - teamForm(g.teams.away);
    const z = (0.30*formDiff*6.0) + (0.15*1.0*1.6);
    const probHome = logistic(z);
    g._pick = { favHome: probHome>=0.5, probHome, hasFull:false, partial:true };
    if(GAMES[g.gamePk] && !GAMES[g.gamePk]._pick) GAMES[g.gamePk]._pick = g._pick;
  }
  fillBoardForecast(g, card);
  paintFrame(g, card);
}

async function hydrateBoardLive(g, card){

    g.linescore = ls;
    const lv = card.querySelector(`#blive-${g.gamePk}`);
    if(lv) lv.innerHTML = liveCenter(g);
  }catch(e){}
}

/* ---------- ESTRATEGIA / BANKROLL ---------- */
// Estado guardado en localStorage:
//   bankroll: capital inicial que el usuario define
//   bets: lista de apuestas registradas {id, pk, fecha, equipo, monto, cuotaAmerican, estado: 'pending'|'won'|'lost'}

function getBank(){
  try{ return JSON.parse(localStorage.getItem('strategy')) || {bankroll:0, bets:[]}; }
  catch(e){ return {bankroll:0, bets:[]}; }
}
function saveBank(s){ localStorage.setItem('strategy', JSON.stringify(s)); }

function americanToDecimal(a){
  a = parseFloat((''+a).replace('+',''));
  if(isNaN(a)||a===0) return null;
  return a>0 ? 1 + a/100 : 1 + 100/(-a);
}

// fraccion de Kelly (0..1). p = prob de nuestro modelo, dec = cuota decimal
function kellyFraction(p, dec){
  const b = dec - 1;
  if(b<=0) return 0;
  const q = 1 - p;
  const f = (b*p - q)/b;
  return Math.max(0, f);
}

// calcula el saldo actual y stats a partir de las apuestas
function bankStats(s){
  let invertido=0, ganado=0, pendiente=0, won=0, lost=0, pend=0;
  for(const b of s.bets){
    if(b.estado==='pending'){ pendiente += b.monto; pend++; continue; }
    invertido += b.monto;
    if(b.estado==='won'){
      const dec = americanToDecimal(b.cuotaAmerican) || 1;
      ganado += b.monto*(dec-1); // ganancia neta
      won++;
    } else if(b.estado==='lost'){
      ganado -= b.monto;
      lost++;
    }
  }
  const saldo = s.bankroll + ganado; // bankroll inicial +/- resultados resueltos
  const roi = invertido>0 ? (ganado/invertido)*100 : 0;
  return {saldo, ganado, invertido, pendiente, won, lost, pend, roi};
}

function loadStrategy(){
  const box = document.getElementById('stratout');
  const s = getBank();
  const st = bankStats(s);
  const disponible = st.saldo - st.pendiente;

  const gananciaClass = st.ganado>0?'pos':(st.ganado<0?'neg':'');
  const roiClass = st.roi>0?'pos':(st.roi<0?'neg':'');

  let html = `
    <div class="bank-card">
      <div class="bank-top">
        <div class="bank-stat"><div class="lbl">Saldo actual</div><div class="val">$${st.saldo.toFixed(0)}</div></div>
        <div class="bank-stat"><div class="lbl">Ganancia / Pérdida</div><div class="val ${gananciaClass}">${st.ganado>=0?'+':''}$${st.ganado.toFixed(0)}</div></div>
        <div class="bank-stat"><div class="lbl">ROI</div><div class="val ${roiClass}">${st.roi>=0?'+':''}${st.roi.toFixed(1)}%</div></div>
      </div>
      <div class="bank-top" style="margin-top:14px">
        <div class="bank-stat"><div class="lbl">Disponible p/ apostar</div><div class="val" style="font-size:22px">$${disponible.toFixed(0)}</div></div>
        <div class="bank-stat"><div class="lbl">Apostado (pendiente)</div><div class="val" style="font-size:22px">$${st.pendiente.toFixed(0)}</div></div>
        <div class="bank-stat"><div class="lbl">Récord apuestas</div><div class="val" style="font-size:22px">${st.won}-${st.lost}${st.pend?' ('+st.pend+' pend)':''}</div></div>
      </div>
      <div class="bank-edit">
        <input type="number" id="bankInput" placeholder="500" value="${s.bankroll||''}">
        <button onclick="setBankroll()">Fijar capital inicial</button>
        ${s.bankroll?'<button class="ghost" onclick="resetStrategy()">Reiniciar todo</button>':''}
      </div>
      <div class="strat-note">⚠️ Esto es un laboratorio de aprendizaje. Los resultados de pocas semanas no son concluyentes. Apuesta solo lo que estés dispuesto a perder. La sugerencia es estadística; la decisión final es tuya.</div>
    </div>`;

  // Sugerencias del dia: partidos con cuotas + valor detectado
  html += `<div class="strat-section-title">Sugerencias de hoy</div>`;
  const sugs = buildSuggestions(s, st);
  if(!sugs){
    html += `<div class="strat-empty">Para ver sugerencias, primero ve a <b>Partidos</b>, abre los juegos de hoy y captura las cuotas de la casa. La app detectará dónde hay valor y aquí te sugerirá cuánto apostar.</div>`;
  } else {
    html += sugs;
  }

  // Apuestas registradas
  html += `<div class="strat-section-title">Mis apuestas</div>`;
  if(!s.bets.length){
    html += `<div class="strat-empty">Aún no has registrado apuestas. Cuando tomes una sugerencia, aparecerá aquí para que marques si ganó o perdió.</div>`;
  } else {
    html += `<div class="bank-card">`;
    // mostrar mas recientes primero
    for(const b of [...s.bets].reverse()){
      html += betRow(b);
    }
    html += `</div>`;
  }

  box.innerHTML = html;
}

function buildSuggestions(s, st){
  const disponible = st.saldo - st.pendiente;
  let out = '';
  let count = 0;
  // recorrer los juegos cargados que tengan pick y cuotas guardadas con valor
  for(const pk in GAMES){
    const g = GAMES[pk];
    if(!g._pick || !g._pick.hasFull) continue;
    const odds = loadOdds(pk);
    if(!odds || (odds.a==='' && odds.h==='')) continue;
    const fmt = odds.fmt || 'american';
    const pa = oddsToProb(odds.a, fmt);
    const ph = oddsToProb(odds.h, fmt);
    if(pa===null || ph===null) continue;
    // normalizar implicitas
    const tot = pa+ph;
    const impAway = pa/tot, impHome = ph/tot;
    const ourHome = g._pick.probHome, ourAway = 1-g._pick.probHome;
    const edgeHome = ourHome - impHome;
    const edgeAway = ourAway - impAway;
    const THRESH = 0.05;
    let side=null, edge=0, ourP=0, oddRaw='';
    if(edgeHome>=THRESH && edgeHome>=edgeAway){ side=g.teams.home.team.name; edge=edgeHome; ourP=ourHome; oddRaw=odds.h; }
    else if(edgeAway>=THRESH){ side=g.teams.away.team.name; edge=edgeAway; ourP=ourAway; oddRaw=odds.a; }
    if(!side) continue;

    // cuota decimal del lado con valor (convertir a americana para guardar)
    let dec, american;
    if(fmt==='decimal'){ dec=parseFloat((''+oddRaw).replace(',','.')); american=decimalToAmerican(dec); }
    else { american=parseFloat((''+oddRaw).replace('+','')); dec=americanToDecimal(american); }
    if(!dec) continue;

    const kf = kellyFraction(ourP, dec);
    if(kf<=0) continue;
    const base = disponible>0 ? disponible : (s.bankroll||0);
    const half = Math.round(base*kf*0.5);
    const quarter = Math.round(base*kf*0.25);
    if(half<1 && quarter<1) continue;

    count++;
    out += `
      <div class="sug-card has-value">
        <div class="sug-match">${g.teams.away.team.name} @ ${g.teams.home.team.name}</div>
        <div><span class="sug-pick">${side}</span><span class="sug-edge">+${(edge*100).toFixed(0)} pts de valor</span></div>
        <div class="sug-match" style="margin-top:6px">Modelo: ${(ourP*100).toFixed(0)}% · Cuota: ${american>0?'+':''}${american}</div>
        <div class="sug-amounts">
          <div class="sug-amt" onclick="registerBet('${pk}','${side.replace(/'/g,"")}',${quarter},${american})">
            <div class="amt-lbl">Conservador (¼)</div>
            <div class="amt-val">$${quarter}</div>
          </div>
          <div class="sug-amt" onclick="registerBet('${pk}','${side.replace(/'/g,"")}',${half},${american})">
            <div class="amt-lbl">Moderado (½)</div>
            <div class="amt-val">$${half}</div>
          </div>
        </div>
      </div>`;
  }
  return count>0 ? out : null;
}

function decimalToAmerican(dec){
  if(!dec||dec<=1) return 0;
  if(dec>=2) return Math.round((dec-1)*100);
  return Math.round(-100/(dec-1));
}

function registerBet(pk, equipo, monto, american){
  if(monto<1){ alert('El monto sugerido es muy bajo para registrar.'); return; }
  const s = getBank();
  const g = GAMES[pk];
  const match = g ? `${g.teams.away.team.name} @ ${g.teams.home.team.name}` : '';
  s.bets.push({
    id: 'b'+Date.now(),
    pk, equipo, monto,
    cuotaAmerican: american,
    match,
    fecha: dateInput.value,
    estado:'pending'
  });
  saveBank(s);
  loadStrategy();
}

function betRow(b){
  let statusBadge = '';
  let actions = '';
  if(b.estado==='pending'){
    actions = `<div class="bet-actions">
      <button class="bet-win" onclick="settleBet('${b.id}','won')">Ganó</button>
      <button class="bet-lose" onclick="settleBet('${b.id}','lost')">Perdió</button>
      <button class="bet-del" onclick="deleteBet('${b.id}')">✕</button>
    </div>`;
  } else {
    const dec = americanToDecimal(b.cuotaAmerican)||1;
    const resultado = b.estado==='won' ? '+$'+(b.monto*(dec-1)).toFixed(0) : '-$'+b.monto.toFixed(0);
    statusBadge = `<span class="bet-status ${b.estado==='won'?'won':'lost'}">${b.estado==='won'?'Ganó':'Perdió'} ${resultado}</span>`;
    actions = `<div class="bet-actions"><button class="bet-del" onclick="deleteBet('${b.id}')">✕</button></div>`;
  }
  return `<div class="bet-row">
    <div class="bet-info">
      <div class="bp">${b.equipo} · $${b.monto}</div>
      <div class="bd">${b.match} · cuota ${b.cuotaAmerican>0?'+':''}${b.cuotaAmerican} · ${b.fecha}</div>
    </div>
    ${statusBadge}
    ${actions}
  </div>`;
}

function settleBet(id, estado){
  const s = getBank();
  const b = s.bets.find(x=>x.id===id);
  if(b){ b.estado = estado; saveBank(s); loadStrategy(); }
}
function deleteBet(id){
  if(!confirm('¿Borrar esta apuesta del registro?')) return;
  const s = getBank();
  s.bets = s.bets.filter(x=>x.id!==id);
  saveBank(s);
  loadStrategy();
}
function setBankroll(){
  const v = parseFloat(document.getElementById('bankInput').value);
  if(isNaN(v)||v<=0){ alert('Pon una cantidad válida para tu capital.'); return; }
  const s = getBank();
  s.bankroll = v;
  saveBank(s);
  loadStrategy();
}
function resetStrategy(){
  if(!confirm('Esto borrará tu capital y TODAS tus apuestas registradas. ¿Seguro?')) return;
  localStorage.removeItem('strategy');
  loadStrategy();
}

async function loadStanding(){
  const box = document.getElementById('standout');
  const season = new Date().getFullYear();
  try{
    // Descubrir el/los leagueId reales de la Mexican League (sportId 23)
    const teams = await fetch(`${API}/teams?sportId=23&season=${season}`).then(r=>r.json());
    const leagueIds = [...new Set((teams.teams||[])
      .filter(t => (t.league?.name||'').toLowerCase().includes('mexican'))
      .map(t => t.league?.id).filter(Boolean))];
    const idParam = leagueIds.length ? leagueIds.join(',') : '125';

    const url = `${API}/standings?leagueId=${idParam}&season=${season}&standingsTypes=regularSeason&hydrate=team,division`;
    let data = await fetch(url).then(r=>r.json());
    let records = data.records || [];
    if(!records.length){
      box.innerHTML = '<div class="status">No se pudo cargar la tabla en este momento.<br>Puede que la liga aún no publique standings para esta temporada.</div>';
      return;
    }
    box.innerHTML = records.map(renderZone).join('');
  }catch(e){
    box.innerHTML = `<div class="err">No se pudo cargar la tabla.<br>${e.message}</div>`;
  }
}

function renderZone(rec){
  const zoneName = rec.division?.nameShort || rec.division?.name
    || rec.league?.name || (rec.division?.abbreviation) || 'Zona';
  let rows='';
  (rec.teamRecords||[]).forEach((tr,i)=>{
    const t = tr.team;
    const wins = tr.wins, losses = tr.losses;
    const pct = tr.winningPercentage || (wins/(wins+losses)).toFixed(3);
    const gb = tr.gamesBack && tr.gamesBack!=='-' ? tr.gamesBack : '—';
    const streak = tr.streak?.streakCode || '';
    rows += `<tr class="${i===0?'leader':''}">
      <td class="tm"><div class="tm-row"><span class="pos">${i+1}</span>
        <img class="tlogo" src="${logoUrl(t.id)}" alt="" onerror="this.style.display='none'">
        <span class="nm">${t.name}</span></div></td>
      <td>${wins}</td><td>${losses}</td>
      <td class="pct">${(typeof pct==='string'?pct:pct.toFixed(3)).replace(/^0/,'')}</td>
      <td class="gb">${gb}</td>
      <td>${streak}</td>
    </tr>`;
  });
  return `<div class="zone">
    <div class="zone-title">${zoneName}</div>
    <table class="stable">
      <thead><tr><th class="l">Equipo</th><th>G</th><th>P</th><th>PCT</th><th>DIF</th><th>RACHA</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

refreshAccuracy();
load();
</script>
